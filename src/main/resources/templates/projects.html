<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meus Projetos - Portfolio</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <style>
        .projects-container {
            padding: 20px;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
        }
        .project-card {
            background: #fdfdfb;
            border: 2px solid #5c5c50;
            padding: 15px;
            box-shadow: 4px 4px 0px #5c5c50;
            transition: transform 0.2s;
        }
        .project-card:hover {
            transform: translateY(-5px);
        }
        .project-title {
            font-weight: bold;
            font-size: 16px;
            margin: 10px 0;
        }
        .project-tech {
            font-size: 12px;
            color: #666;
            margin: 8px 0;
        }
        .project-links {
            margin-top: 10px;
        }
        .project-links a {
            display: inline-block;
            margin-right: 10px;
            padding: 5px 10px;
            background: #5c5c50;
            color: white;
            text-decoration: none;
            font-size: 12px;
            border-radius: 2px;
        }
        .project-links a:hover {
            background: #3c3c30;
        }
        .no-projects {
            text-align: center;
            padding: 40px;
            color: #666;
        }
    </style>
</head>
<body>
    <main class="desktop">
        <div style="padding: 20px;">
            <h1 style="color: #5c5c50; font-family: 'Courier New';">Meus Projetos</h1>

            <div class="projects-container" th:if="${!projects.isEmpty()}">
                <div class="project-card" th:each="project : ${projects}">
                    <div class="project-title" th:text="${project.title}">Projeto</div>
                    <div class="project-tech" th:text="${project.technologies}">Tecnologias</div>
                    <p th:text="${project.description}">Descrição breve</p>
                    <div class="project-links">
                        <a th:href="${project.projectUrl}" th:if="${project.projectUrl}" target="_blank">Ver Projeto</a>
                        <a th:href="${project.githubUrl}" th:if="${project.githubUrl}" target="_blank">GitHub</a>
                    </div>
                </div>
            </div>

            <div class="no-projects" th:if="${projects.isEmpty()}">
                <p>Nenhum projeto publicado no momento. Em breve!</p>
            </div>
        </div>
    </main>

    <footer class="taskbar">
        <div class="start-button">START</div>
        <div class="taskbar-divider"></div>
        <div class="social-icons">
            <a href="/" style="text-decoration: none;">
                <div class="social-box">Home</div>
            </a>
            <a href="/contact" style="text-decoration: none;">
                <div class="social-box">Contato</div>
            </a>
        </div>
    </footer>
</body>
</html>
