<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contato - Portfolio</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <style>
        .contact-container {
            padding: 20px;
            max-width: 600px;
            margin: 0 auto;
        }
        .contact-form {
            background: #fdfdfb;
            border: 2px solid #5c5c50;
            padding: 20px;
            box-shadow: 6px 6px 0px #5c5c50;
        }
        .form-group {
            margin-bottom: 15px;
        }
        .form-group label {
            display: block;
            font-weight: bold;
            margin-bottom: 5px;
            font-family: 'Courier New';
            color: #5c5c50;
        }
        .form-group input,
        .form-group textarea {
            width: 100%;
            padding: 8px;
            border: 1px solid #bcbcaf;
            font-family: 'Courier New';
            box-sizing: border-box;
        }
        .form-group textarea {
            resize: vertical;
            min-height: 150px;
        }
        .submit-btn {
            background: #5c5c50;
            color: white;
            padding: 10px 20px;
            border: 1px solid black;
            cursor: pointer;
            font-weight: bold;
            font-family: 'Courier New';
        }
        .submit-btn:hover {
            background: #3c3c30;
        }
        .alert {
            padding: 15px;
            margin-bottom: 15px;
            border: 1px solid #bcbcaf;
        }
        .alert-success {
            background-color: #d4edda;
            color: #155724;
            border-color: #c3e6cb;
        }
        .alert-error {
            background-color: #f8d7da;
            color: #721c24;
            border-color: #f5c6cb;
        }
    </style>
</head>
<body>
    <main class="desktop">
        <div class="contact-container">
            <h1 style="color: #5c5c50; font-family: 'Courier New';">Entre em Contato</h1>

            <div class="alert alert-success" th:if="${successMessage}" th:text="${successMessage}"></div>
            <div class="alert alert-error" th:if="${errorMessage}" th:text="${errorMessage}"></div>

            <form class="contact-form" th:action="@{/contact}" method="post" th:object="${contactMessage}">
                <div class="form-group">
                    <label for="name">Nome:</label>
                    <input type="text" id="name" th:field="*{name}" required>
                </div>

                <div class="form-group">
                    <label for="email">Email:</label>
                    <input type="email" id="email" th:field="*{email}" required>
                </div>

                <div class="form-group">
                    <label for="subject">Assunto:</label>
                    <input type="text" id="subject" th:field="*{subject}">
                </div>

                <div class="form-group">
                    <label for="message">Mensagem:</label>
                    <textarea id="message" th:field="*{message}" required></textarea>
                </div>

                <button type="submit" class="submit-btn">Enviar Mensagem</button>
            </form>
        </div>
    </main>

    <footer class="taskbar">
        <div class="start-button">START</div>
        <div class="taskbar-divider"></div>
        <div class="social-icons">
            <a href="/" style="text-decoration: none;">
                <div class="social-box">Home</div>
            </a>
            <a href="/projects" style="text-decoration: none;">
                <div class="social-box">Projetos</div>
            </a>
        </div>
    </footer>
</body>
</html>
